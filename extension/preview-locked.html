<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}

  :root[data-theme="dark"]{
    --bg:#0f1015;
    --surface:#151721;
    --surface-2:#181a26;
    --border:rgba(255,255,255,.06);
    --border-strong:rgba(255,255,255,.1);
    --fg:#e6e7ec;
    --muted:#a2a6b4;
    --placeholder:#5b6070;
    --foot:#4b5060;
    --icon:#9aa0ae;
  }
  :root[data-theme="light"]{
    --bg:#f5f7fb;
    --surface:#ffffff;
    --surface-2:#f0f3f8;
    --border:rgba(15,20,35,.08);
    --border-strong:rgba(15,20,35,.14);
    --fg:#0f1424;
    --muted:#4a5063;
    --placeholder:#9096a5;
    --foot:#8b91a1;
    --icon:#5b6070;
  }

  body{display:grid;place-items:center;min-height:100vh;padding:0}
  .wrap{
    width:100%;height:100%;padding:10px;
    background:var(--bg);color:var(--fg);
    display:flex;flex-direction:column;gap:8px;
  }
  .top{position:relative;display:flex;align-items:center;justify-content:center;min-height:24px}
  .logo{
    width:24px;height:24px;border-radius:7px;
    background:rgba(43,183,220,.08);
    display:grid;place-items:center;
    border:1px solid rgba(43,183,220,.18);
  }
  .logo img{width:16px;height:16px;object-fit:contain}
  .theme-btn{
    position:absolute;right:0;top:0;
    width:22px;height:22px;border-radius:7px;
    background:transparent;border:1px solid var(--border);
    color:var(--icon);display:grid;place-items:center;cursor:pointer;
    transition:background .2s,border-color .2s,color .2s;
  }
  .theme-btn:hover{background:var(--surface);border-color:var(--border-strong);color:var(--fg)}

  .prompt{font-size:10.5px;color:var(--muted);line-height:1.35;text-align:center}

  .input{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:7px;
    padding:8px 10px;
    color:var(--fg);font-size:11px;
    outline:none;
    transition:border-color .2s,background .2s;
  }
  .input::placeholder{color:var(--placeholder)}
  .input:focus{border-color:rgba(43,183,220,.55);background:var(--surface-2)}

  .activate{
    width:100%;padding:8px 10px;
    border:none;border-radius:7px;
    background:linear-gradient(180deg,#2bb7dc,#1a8fb0);
    color:#fff;font-size:11.5px;font-weight:700;
    letter-spacing:.2px;cursor:pointer;
    box-shadow:0 6px 20px -8px rgba(43,183,220,.55),
               inset 0 1px 0 rgba(255,255,255,.18);
    transition:filter .15s,transform .15s;
  }
  .activate:hover{filter:brightness(1.08)}
  .activate:active{transform:translateY(1px)}

  .support{
    display:flex;align-items:center;justify-content:center;gap:6px;
     padding:7px;border-radius:7px;
    background:var(--surface);border:1px solid var(--border);
     color:var(--fg);text-decoration:none;font-size:10.5px;font-weight:500;
    transition:border-color .2s,background .2s;
  }
  .support:hover{border-color:rgba(43,183,220,.4);background:var(--surface-2)}
  .support svg{color:#25d366;flex-shrink:0}
   .support span{color:var(--muted);font-size:10px}
  .support b{color:var(--fg);font-weight:600}

  .foot{margin-top:auto;text-align:center;font-size:8.5px;color:var(--foot);letter-spacing:.35px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo"><img src="ueda-logo.png" alt="UEDA"></div>
      <button class="theme-btn" id="themeBtn" type="button" aria-label="Alternar tema">
        <svg id="iconMoon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="iconSun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>

    <p class="prompt">Insira sua chave para ativar a extensão.</p>

    <input class="input" type="text" placeholder="Sua chave de licença…" />

    <button class="activate" id="activateBtn" type="button">Ativar Licença</button>

    <a class="support" href="https://wa.me/5577999134858?text=Ol%C3%A1%2C%20preciso%20de%20suporte%20com%20a%20extens%C3%A3o%20UEDA" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.966-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>Suporte:</span><b>77 99913-4858</b>
    </a>

    <p class="foot">UEDA AGENCY · v1.5</p>
  </div>

<script>
  (function(){
    var root=document.documentElement;
    var btn=document.getElementById('themeBtn');
    var moon=document.getElementById('iconMoon');
    var sun=document.getElementById('iconSun');
    var saved=localStorage.getItem('ueda-theme')||'dark';
    apply(saved);
    btn.addEventListener('click',function(){
      var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
      apply(next);
      localStorage.setItem('ueda-theme',next);
    });
    function apply(t){
      root.setAttribute('data-theme',t);
      moon.style.display=t==='dark'?'block':'none';
      sun.style.display=t==='light'?'block':'none';
    }

    document.getElementById('activateBtn').addEventListener('click',function(){
      window.confirm('OK');
    });
  })();
</script>
</body>
</html>

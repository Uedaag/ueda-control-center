<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app-shell">
    <header class="header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <img src="logo.png" alt="Logo UEDA AGENCY">
        </span>
        <h1 id="brandTitle">
          <span class="brand-text">
            <span class="brand-letter" style="animation-delay: 0s;">U</span>
            <span class="brand-letter" style="animation-delay: 0.08s;">E</span>
            <span class="brand-letter" style="animation-delay: 0.16s;">D</span>
            <span class="brand-letter" style="animation-delay: 0.24s;">A</span>
            <span class="brand-letter" style="animation-delay: 0.32s;">&nbsp;</span>
            <span class="brand-letter" style="animation-delay: 0.4s;">A</span>
            <span class="brand-letter" style="animation-delay: 0.48s;">G</span>
            <span class="brand-letter" style="animation-delay: 0.56s;">E</span>
            <span class="brand-letter" style="animation-delay: 0.64s;">N</span>
            <span class="brand-letter" style="animation-delay: 0.72s;">C</span>
            <span class="brand-letter" style="animation-delay: 0.8s;">Y</span>
          </span>
        </h1>
        <div>
          <p class="user-line" id="userLine"></p>
        </div>
      </div>
      <span class="live-dot" aria-hidden="true"></span>
    </header>

    <section id="loginView" class="login-wrapper">
      <form class="login-form">
        <div class="login-form-texture"></div>
        <h1 class="login-brand-title">
          <span class="brand-text">
            <span class="brand-letter" style="animation-delay: 0s;">U</span>
            <span class="brand-letter" style="animation-delay: 0.08s;">E</span>
            <span class="brand-letter" style="animation-delay: 0.16s;">D</span>
            <span class="brand-letter" style="animation-delay: 0.24s;">A</span>
            <span class="brand-letter" style="animation-delay: 0.32s;">&nbsp;</span>
            <span class="brand-letter" style="animation-delay: 0.4s;">A</span>
            <span class="brand-letter" style="animation-delay: 0.48s;">G</span>
            <span class="brand-letter" style="animation-delay: 0.56s;">E</span>
            <span class="brand-letter" style="animation-delay: 0.64s;">N</span>
            <span class="brand-letter" style="animation-delay: 0.72s;">C</span>
            <span class="brand-letter" style="animation-delay: 0.8s;">Y</span>
          </span>
        </h1>
        <div class="login-input-container">
          <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 21a6 6 0 0 0-4.24 1.76" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
          </svg>
          <input type="text" id="keyInput" class="login-input" placeholder="Insira sua key" autocomplete="off">
        </div>
        <button id="loginButton" class="login-button-wrapper" type="button">
          <span class="login-button-text">Entrar</span>
        </button>
        <p class="login-msg" id="loginMsg"></p>
      </form>
    </section>

    <section id="homeView" class="home-view" hidden>
      <section class="panel warning" id="warningBox" hidden>
        <p class="warning-title">Key expirada, sair</p>
        <p class="panel-description">As interceptacoes pararam de funcionar.</p>
      </section>

      <section class="panel toggle-panel">
        <div>
          <p class="panel-label">Status</p>
          <p class="panel-description">Ative para usar a extensao neste site.</p>
        </div>
        <div class="toggle-container">
          <div class="toggle-wrap">
            <input class="toggle-input" id="enabled" type="checkbox" />
            <label class="toggle-track" for="enabled">
              <div class="track-lines">
                <div class="track-line"></div>
              </div>
              <div class="toggle-thumb">
                <div class="thumb-core"></div>
                <div class="thumb-inner"></div>
                <div class="thumb-scan"></div>
                <div class="thumb-particles">
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                </div>
              </div>
              <div class="toggle-data">
                <div class="data-text off">OFF</div>
                <div class="data-text on">ON</div>
                <div class="status-indicator off"></div>
                <div class="status-indicator on"></div>
              </div>
              <div class="energy-rings">
                <div class="energy-ring"></div>
                <div class="energy-ring"></div>
                <div class="energy-ring"></div>
              </div>
              <div class="interface-lines">
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
              </div>
              <div class="toggle-reflection"></div>
              <div class="holo-glow"></div>
            </label>
          </div>
        </div>
      </section>

      <section class="panel">
        <p class="panel-label">Modo de operacao</p>
        <div class="radio-group-container" id="modeGroup" role="radiogroup" aria-label="Modo de operacao">
          <label class="radio-label" for="mode1">
            <input type="radio" id="mode1" name="mode" value="1" class="radio-input">
            <div class="radio-custom"></div>
            <div class="radio-text-container">
              <span class="radio-text">Modo Padrao</span>
              <span class="radio-description">Mais estabilidade no uso diario.</span>
            </div>
          </label>
          <label class="radio-label" for="mode2">
            <input type="radio" id="mode2" name="mode" value="2" class="radio-input">
            <div class="radio-custom"></div>
            <div class="radio-text-container">
              <span class="radio-text">Modo Padrao 2</span>
              <span class="radio-description">Mais estabilidade no uso diario.</span>
            </div>
          </label>

        </div>
      </section>

      <section class="panel toggle-panel">
        <div>
          <p class="panel-label">Mostrar validade</p>
          <p class="panel-description">Oculta ou mostra o countdown na Lovable.</p>
        </div>
        <div class="toggle-container">
          <div class="toggle-wrap">
            <input class="toggle-input" id="showValidity" type="checkbox" />
            <label class="toggle-track" for="showValidity">
              <div class="track-lines">
                <div class="track-line"></div>
              </div>
              <div class="toggle-thumb">
                <div class="thumb-core"></div>
                <div class="thumb-inner"></div>
                <div class="thumb-scan"></div>
                <div class="thumb-particles">
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                  <div class="thumb-particle"></div>
                </div>
              </div>
              <div class="toggle-data">
                <div class="data-text off">OFF</div>
                <div class="data-text on">ON</div>
                <div class="status-indicator off"></div>
                <div class="status-indicator on"></div>
              </div>
              <div class="energy-rings">
                <div class="energy-ring"></div>
                <div class="energy-ring"></div>
                <div class="energy-ring"></div>
              </div>
              <div class="interface-lines">
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
                <div class="interface-line"></div>
              </div>
              <div class="toggle-reflection"></div>
              <div class="holo-glow"></div>
            </label>
          </div>
        </div>
      </section>



      <button id="logoutButton" class="logout-button" type="button">Log out</button>
    </section>

    <p class="status" id="status" role="status" aria-live="polite">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-text">Tudo certo</span>
      <span class="countdown" id="countdown"></span>
    </p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
